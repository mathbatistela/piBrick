---
# Desktop-stack apt packages. Kernel-driver build deps (build-essential, linux-headers,
# device-tree-compiler, gpiod, evemu-tools, wlr-randr) are installed by pibrick-driver's own
# install.sh and intentionally NOT duplicated here — see hardware/overview.md.
- name: Install desktop-stack packages
  become: true
  ansible.builtin.apt:
    name:
      - foot
      - fuzzel
      - cava
      - qt6ct
      - squeekboard
      - wayvnc
      - mpv
    state: present
    update_cache: true
    cache_valid_time: 3600

# mise (programming language/tool version manager, https://mise.jdx.dev) isn't in Debian's repos,
# so it's installed from its own apt repo rather than a curl-pipe-sh script, for idempotency and
# apt-managed upgrades. Same keyring/repo pattern as the DankLinux OBS repo in
# roles/dotfiles/tasks/greeter.yml.
- name: Ensure /etc/apt/keyrings exists
  become: true
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Add mise apt repo GPG key
  become: true
  ansible.builtin.shell: |
    set -euo pipefail
    curl -fsSL https://mise.jdx.dev/gpg-key.pub | gpg --dearmor -o /etc/apt/keyrings/mise.gpg
  args:
    creates: /etc/apt/keyrings/mise.gpg
    executable: /bin/bash

- name: Add mise apt repository
  become: true
  ansible.builtin.copy:
    content: |
      deb [signed-by=/etc/apt/keyrings/mise.gpg arch={{ (ansible_architecture == 'aarch64') | ternary('arm64', 'amd64') }}] https://mise.jdx.dev/deb stable main
    dest: /etc/apt/sources.list.d/mise.list
    mode: "0644"
  register: mise_repo

- name: Update apt cache after adding the repo
  become: true
  ansible.builtin.apt:
    update_cache: true
  when: mise_repo.changed

- name: Install mise
  become: true
  ansible.builtin.apt:
    name: mise
    state: present
