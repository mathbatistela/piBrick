---
# One file per application below, each self-contained (its own directory-creation,
# copy tasks, become/notify as needed). To add a new dotfile: drop the file(s) under
# dotfiles/<app>/, add a tasks/<app>.yml here, then include it below.
- name: Apply niri dotfiles
  ansible.builtin.include_tasks: niri.yml

- name: Apply foot dotfiles
  ansible.builtin.include_tasks: foot.yml

- name: Apply bash dotfiles
  ansible.builtin.include_tasks: bash.yml

- name: Apply wayvnc dotfiles
  ansible.builtin.include_tasks: wayvnc.yml

- name: Apply autostart dotfiles
  ansible.builtin.include_tasks: autostart.yml

- name: Apply GTK theme
  ansible.builtin.include_tasks: gtk-theme.yml
