---
- name: Ensure autostart config directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.config/autostart"
    state: directory
    mode: "0755"

- name: Disable squeekboard on-screen-keyboard autostart
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../dotfiles/autostart/squeekboard.desktop"
    dest: "{{ ansible_env.HOME }}/.config/autostart/squeekboard.desktop"
    mode: "0644"

- name: Mask the generated squeekboard systemd unit
  ansible.builtin.systemd:
    name: app-squeekboard@autostart.service
    scope: user
    state: stopped
    masked: true

# Under niri (unlike rpd-labwc), both lxpolkit and polkit-mate-authentication-agent-1
# autostart and race to register as the session's PolicyKit agent, throwing a visible
# "An authentication agent already exists for the given subject" error on boot. Mask
# the MATE one so only lxpolkit runs. See docs/setup/niri-dms-setup.md for the full story.
- name: Disable duplicate MATE polkit authentication agent autostart
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../dotfiles/autostart/polkit-mate-authentication-agent-1.desktop"
    dest: "{{ ansible_env.HOME }}/.config/autostart/polkit-mate-authentication-agent-1.desktop"
    mode: "0644"
