---
- name: Ensure niri config directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ ansible_env.HOME }}/.config/niri"
    - "{{ ansible_env.HOME }}/.config/niri/dms"

- name: Apply niri main config
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../dotfiles/niri/config.kdl"
    dest: "{{ ansible_env.HOME }}/.config/niri/config.kdl"
    mode: "0644"

- name: Apply DankMaterialShell-generated niri config fragments
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: "{{ ansible_env.HOME }}/.config/niri/dms/{{ item | basename }}"
    mode: "0644"
  with_fileglob:
    - "{{ playbook_dir }}/../dotfiles/niri/dms/*.kdl"

# niri+DMS is the device's default desktop; rpd-labwc stays installed as a selectable
# fallback from the lightdm-gtk-greeter session dropdown.
- name: Set niri as the lightdm autologin/default session
  become: true
  ansible.builtin.lineinfile:
    path: /etc/lightdm/lightdm.conf
    regexp: "^{{ item }}="
    line: "{{ item }}=niri"
  loop:
    - autologin-session
    - user-session
  notify: Restart lightdm
