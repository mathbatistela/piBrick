---
- name: Ensure starship config directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.config"
    state: directory
    mode: "0755"

- name: Apply zshrc
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../dotfiles/zsh/zshrc"
    dest: "{{ ansible_env.HOME }}/.zshrc"
    mode: "0644"

- name: Apply starship prompt config
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../dotfiles/starship/starship.toml"
    dest: "{{ ansible_env.HOME }}/.config/starship.toml"
    mode: "0644"

- name: Set zsh as the default login shell
  become: true
  ansible.builtin.user:
    name: "{{ ansible_user_id }}"
    shell: /usr/bin/zsh
